name: Project work
description: Capture planned feature work, refactors, documentation, or operational improvements.
title: "[Work] "
body:
  - type: markdown
    attributes:
      value: |
        Use this template for features, refactors, architecture work, documentation changes, and repo operations.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be true when this issue is done?
      placeholder: Describe the intended outcome.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this issue?
      placeholder: |
        - Add a roadmap document
        - Add an architecture document
        - Link both from the README
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: What should not be changed as part of this issue?
      placeholder: |
        - No code reorganization
        - No runtime behavior changes
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List the observable requirements for completion.
      placeholder: |
        - [ ] Specific, testable requirement
        - [ ] Specific, testable requirement
        - [ ] Specific, testable requirement
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this be tested or checked?
      placeholder: |
        Commands to run:
        - python -m pytest -q v0.4/tests

        Manual checks:
        - Verify the updated documentation is internally consistent
    validations:
      required: true
